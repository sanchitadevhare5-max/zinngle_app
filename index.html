    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #0f172a; /* Slate 900 */
        color: #fff;
        /* Privacy: Prevent Selection and Touch Callouts */
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      
      /* Privacy: Disable Image Dragging */
      img {
        pointer-events: none;
        -webkit-user-drag: none;
      }

      /* Privacy: Hide content in Print/PDF generation (often used to screenshot) */
      @media print {
        html, body {
          display: none !important;
          height: 0 !important;
          overflow: hidden !important;
        }
      }

      /* Hide scrollbar for clean UI */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes pulse-ring {
        0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.7); }
        70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(236, 72, 153, 0); }
        100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
      }
      .animate-pulse-ring {
        animation: pulse-ring 2s infinite;
      }
      @keyframes fade-in-up {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 0.8s ease-out forwards;
      }
    </style>
